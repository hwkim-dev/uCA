name: Sphinx Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx pydata-sphinx-theme myst-parser sphinxcontrib-mermaid

      - name: Build English Sphinx HTML
        run: |
          sphinx-build -b html . _build/html/en

      - name: Build Korean Sphinx HTML
        run: |
          sphinx-build -b html ko _build/html/ko

      - name: Create root redirect page and disable Jekyll
        run: |
          mkdir -p _build/html
          touch _build/html/.nojekyll
          cat > _build/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0; url=en/index.html">
            <link rel="canonical" href="en/index.html">
            <title>pccx Documentation</title>
            <style>
              html,body{margin:0;padding:0;background:#1a1a1a;color:#eee;
                        font-family:sans-serif;display:flex;justify-content:center;
                        align-items:center;min-height:100vh;}
              .box{text-align:center;}
              a{color:#a78bfa;margin:0 12px;font-size:1.1em;}
            </style>
          </head>
          <body>
            <div class="box">
              <h1>pccx Documentation</h1>
              <p><a href="en/index.html">English</a> | <a href="ko/index.html">한국어</a></p>
            </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/html
