name: Sphinx Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx pydata-sphinx-theme myst-parser sphinxcontrib-mermaid

      - name: Build English Sphinx HTML
        run: |
          sphinx-build -b html . _build/html/en

      - name: Build Korean Sphinx HTML
        run: |
          sphinx-build -b html ko _build/html/ko

      - name: Create root redirect page and disable Jekyll
        run: |
          mkdir -p _build/html
          touch _build/html/.nojekyll
          cat > _build/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>pccx Documentation</title>
            <link rel="canonical" href="en/index.html">
            <script>
              (function () {
                var lang = (navigator.language || 'en').toLowerCase();
                var target = lang.indexOf('ko') === 0 ? 'ko/index.html' : 'en/index.html';
                location.replace(target);
              })();
            </script>
            <meta http-equiv="refresh" content="0; url=en/index.html">
            <style>html,body{margin:0;padding:0;background:#1a1a1a;}</style>
          </head>
          <body></body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/html
