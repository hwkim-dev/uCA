name: Sphinx Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Which external RTL version should be cloned into `codes/<ACTIVE_VERSION>/`
# at build time. Archived versions remain committed inside this repo and are
# read from disk. See CLAUDE.md §8.4 (cutover ceremony) — bump this value as
# part of the vN → vN+1 transition.
env:
  ACTIVE_VERSION: v002
  RTL_REPO_URL: https://github.com/hwkim-dev/pccx-FPGA-NPU-LLM-kv260
  RTL_REPO_REF: main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Sphinx toolchain (pinned)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install system deps (Graphviz for sphinx.ext.graphviz)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends graphviz

      - name: Clone active ${{ env.ACTIVE_VERSION }} RTL
        run: |
          git clone --depth 1 --branch "${RTL_REPO_REF}" \
              "${RTL_REPO_URL}" "codes/${ACTIVE_VERSION}"

      - name: Build English Sphinx HTML (strict)
        run: |
          sphinx-build -W --keep-going -b html . _build/html/en

      - name: Build Korean Sphinx HTML (strict)
        run: |
          sphinx-build -W --keep-going -b html ko _build/html/ko

      - name: Create root redirect page and disable Jekyll
        run: |
          mkdir -p _build/html
          touch _build/html/.nojekyll
          cat > _build/html/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <meta http-equiv="refresh" content="0; url=en/index.html">
            <link rel="canonical" href="en/index.html">
            <title>pccx Documentation</title>
            <style>
              html,body{margin:0;padding:0;background:#1a1a1a;color:#eee;
                        font-family:sans-serif;display:flex;justify-content:center;
                        align-items:center;min-height:100vh;}
              .box{text-align:center;}
              a{color:#a78bfa;margin:0 12px;font-size:1.1em;}
            </style>
          </head>
          <body>
            <div class="box">
              <h1>pccx Documentation</h1>
              <p><a href="en/index.html">English</a> | <a href="ko/index.html">한국어</a></p>
            </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/html
