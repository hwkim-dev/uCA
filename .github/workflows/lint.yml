name: Docs lint

on:
  pull_request:
    paths:
      - "docs/**"
      - "ko/docs/**"
      - "conf_common.py"
      - "conf.py"
      - "ko/conf.py"
      - "_static/**"
      - "_templates/**"
      - "index.rst"
      - "ko/index.rst"
      - "refs.bib"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "Makefile"
      - ".github/workflows/lint.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "ko/docs/**"
      - "conf_common.py"
      - "conf.py"
      - "ko/conf.py"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "Makefile"
  workflow_dispatch:

env:
  ACTIVE_VERSION: v002
  # docs/v002/RTL/ literalincludes resolve against the active v002
  # IP-core package (pccxai/pccx-v002). The pccx-FPGA-NPU-LLM-kv260
  # board integration repo no longer holds the reusable RTL.
  RTL_REPO_URL: https://github.com/pccxai/pccx-v002
  RTL_REPO_REF: main
  # Opt JavaScript actions into the Node.js 24 runtime ahead of the
  # 2026-06-02 forced cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  strict-build:
    name: Strict -W Sphinx build (EN + KO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install system deps (graphviz for sphinx.ext.graphviz)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends graphviz

      - name: Clone active ${{ env.ACTIVE_VERSION }} RTL
        run: |
          # RTL_REPO_REF may be a branch, tag, or commit SHA. `--branch`
          # only accepts branch/tag names, so do a shallow checkout that
          # works for all three.
          git clone --filter=blob:none --no-checkout \
              "${RTL_REPO_URL}" "codes/${ACTIVE_VERSION}"
          git -C "codes/${ACTIVE_VERSION}" checkout "${RTL_REPO_REF}"

      - name: make strict (EN + KO, -W --keep-going)
        run: make strict

  lint:
    name: sphinx-lint + codespell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: make lint (sphinx-lint + codespell)
        run: make lint
