<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img">
  <title>pccx v002 Memory Hierarchy &amp; Interconnect</title>
  
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#000000"/>
    </marker>
    <style><![CDATA[
      text { fill: #000000; font: 400 12px "IBM Plex Mono", "Courier New", "JetBrains Mono", ui-monospace, monospace; }
      .t-title { font-weight: 600; font-size: 14px; text-anchor: middle; }
      .t-label { font-size: 11px; text-anchor: middle; }
      .t-spec  { font-size: 10px; fill: #444444; text-anchor: middle; }
      
      .panel-dram { fill: #f5edd5; stroke: #000000; stroke-width: 0.8; }
      .panel-pl   { fill: #fafafa; stroke: #000000; stroke-width: 0.8; stroke-dasharray: 4 2; }
      .block-mem  { fill: #e2efd8; stroke: #000000; stroke-width: 0.8; }
      .block-ctrl { fill: #fce5c6; stroke: #000000; stroke-width: 0.8; }
      .line       { stroke: #000000; stroke-width: 1; fill: none; marker-end: url(#arr); }
      .domain     { fill: #f8f9fa; stroke: #cccccc; stroke-width: 0.5; }
    ]]></style>
  </defs>

  <!-- White canvas -->
  <rect x="0" y="0" width="640" height="420" fill="#ffffff"/>

  <!-- External Domain (DDR4) -->
  <rect class="panel-dram" x="220" y="30" width="200" height="60"/>
  <text class="t-title" x="320" y="55">Host DDR4</text>
  <text class="t-spec" x="320" y="75">19.2 GB/s @ 2400 MT/s</text>

  <!-- Clock Domain Separator (CDC) -->
  <line class="line" x1="320" y1="90" x2="320" y2="130"/>
  <text class="t-spec" x="380" y="115">AXI HP/ACP (250 MHz)</text>

  <!-- On-Chip Logic Border -->
  <rect class="panel-pl" x="40" y="140" width="560" height="240"/>
  <text class="t-label" x="100" y="155" text-anchor="start">PL (400 MHz Domain)</text>

  <!-- Memory Blocks -->
  <!-- Weight Buffer -->
  <rect class="block-mem" x="70" y="180" width="140" height="60"/>
  <text class="t-title" x="140" y="205">Weight Buffer</text>
  <text class="t-spec" x="140" y="225">URAM FIFO (4×64KB)</text>

  <!-- L2 Cache -->
  <rect class="block-mem" x="250" y="180" width="140" height="60"/>
  <text class="t-title" x="320" y="205">L2 Cache</text>
  <text class="t-spec" x="320" y="225">URAM (1.75 MB)</text>

  <!-- Constant Cache -->
  <rect class="block-mem" x="430" y="180" width="140" height="60"/>
  <text class="t-title" x="500" y="205">Constant Cache</text>
  <text class="t-spec" x="500" y="225">BRAM (per-core)</text>

  <!-- L1 Cache -->
  <rect class="block-mem" x="250" y="280" width="140" height="50"/>
  <text class="t-title" x="320" y="305">L1 Cache / Regs</text>
  <text class="t-spec" x="320" y="320">BRAM / DSP P-reg</text>

  <!-- Interconnects -->
  <line class="line" x1="140" y1="240" x2="280" y2="280"/>
  <line class="line" x1="320" y1="240" x2="320" y2="280"/>
  <line class="line" x1="500" y1="240" x2="360" y2="280"/>

  <text class="t-spec" x="200" y="265" transform="rotate(-15 200 265)">W4 Stream</text>
  <text class="t-spec" x="340" y="260">A8 Bus</text>

</svg>
