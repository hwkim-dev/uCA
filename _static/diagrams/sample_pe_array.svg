<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" role="img"
     aria-labelledby="title-sample-pe desc-sample-pe">
  <title id="title-sample-pe">4×4 PE array — weight-stationary dataflow</title>
  <desc id="desc-sample-pe">A 4 by 4 grid of processing elements. Weights
    stay resident inside each PE. Activations stream left-to-right along
    each row while partial sums accumulate top-to-bottom along each column.
  </desc>

  <style><![CDATA[
    .pe      { stroke: currentColor; stroke-width: 1.25; fill: var(--color-background-secondary, transparent); }
    .pe-label{ fill: currentColor; font: 600 13px ui-sans-serif, system-ui, sans-serif; text-anchor: middle; }
    .legend  { fill: currentColor; font: 12px ui-sans-serif, system-ui, sans-serif; }
    .flow-a  { stroke: var(--color-brand-primary, #0b5fff); stroke-width: 1.5; fill: none; marker-end: url(#arrow-a); }
    .flow-w  { stroke: var(--pccx-accent, currentColor); stroke-width: 1.5; fill: none; marker-end: url(#arrow-w); stroke-dasharray: 4 3; }
    .flow-p  { stroke: currentColor; stroke-width: 1.5; fill: none; opacity: 0.55; marker-end: url(#arrow-p); }
    .axis    { stroke: currentColor; stroke-width: 0.75; opacity: 0.45; fill: none; }
    .axis-l  { fill: currentColor; font: 11px ui-sans-serif, system-ui, sans-serif; opacity: 0.75; }
  ]]></style>

  <defs>
    <marker id="arrow-a" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--color-brand-primary, #0b5fff)"/>
    </marker>
    <marker id="arrow-w" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--pccx-accent, currentColor)"/>
    </marker>
    <marker id="arrow-p" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Axis guides -->
  <line class="axis" x1="140"  y1="50"  x2="460" y2="50" />
  <line class="axis" x1="100"  y1="90"  x2="100" y2="320"/>
  <text class="axis-l" x="460" y="42"  text-anchor="end">Activations →</text>
  <text class="axis-l" x="92"  y="325" text-anchor="end">
    <tspan x="92" dy="0">Partial</tspan>
    <tspan x="92" dy="12">sums</tspan>
    <tspan x="92" dy="12">↓</tspan>
  </text>

  <!-- 4×4 PE grid -->
  <g id="grid">
    <!-- row 0 -->
    <rect class="pe" x="140" y="70"  width="70" height="50" rx="6"/>
    <rect class="pe" x="225" y="70"  width="70" height="50" rx="6"/>
    <rect class="pe" x="310" y="70"  width="70" height="50" rx="6"/>
    <rect class="pe" x="395" y="70"  width="70" height="50" rx="6"/>
    <!-- row 1 -->
    <rect class="pe" x="140" y="135" width="70" height="50" rx="6"/>
    <rect class="pe" x="225" y="135" width="70" height="50" rx="6"/>
    <rect class="pe" x="310" y="135" width="70" height="50" rx="6"/>
    <rect class="pe" x="395" y="135" width="70" height="50" rx="6"/>
    <!-- row 2 -->
    <rect class="pe" x="140" y="200" width="70" height="50" rx="6"/>
    <rect class="pe" x="225" y="200" width="70" height="50" rx="6"/>
    <rect class="pe" x="310" y="200" width="70" height="50" rx="6"/>
    <rect class="pe" x="395" y="200" width="70" height="50" rx="6"/>
    <!-- row 3 -->
    <rect class="pe" x="140" y="265" width="70" height="50" rx="6"/>
    <rect class="pe" x="225" y="265" width="70" height="50" rx="6"/>
    <rect class="pe" x="310" y="265" width="70" height="50" rx="6"/>
    <rect class="pe" x="395" y="265" width="70" height="50" rx="6"/>

    <!-- PE labels -->
    <text class="pe-label" x="175" y="100">PE</text>
    <text class="pe-label" x="260" y="100">PE</text>
    <text class="pe-label" x="345" y="100">PE</text>
    <text class="pe-label" x="430" y="100">PE</text>
    <text class="pe-label" x="175" y="165">PE</text>
    <text class="pe-label" x="260" y="165">PE</text>
    <text class="pe-label" x="345" y="165">PE</text>
    <text class="pe-label" x="430" y="165">PE</text>
    <text class="pe-label" x="175" y="230">PE</text>
    <text class="pe-label" x="260" y="230">PE</text>
    <text class="pe-label" x="345" y="230">PE</text>
    <text class="pe-label" x="430" y="230">PE</text>
    <text class="pe-label" x="175" y="295">PE</text>
    <text class="pe-label" x="260" y="295">PE</text>
    <text class="pe-label" x="345" y="295">PE</text>
    <text class="pe-label" x="430" y="295">PE</text>
  </g>

  <!-- Activation flow (left → right, one arrow per row) -->
  <g id="act-flow">
    <line class="flow-a" x1="100" y1="95"  x2="140" y2="95" />
    <line class="flow-a" x1="100" y1="160" x2="140" y2="160"/>
    <line class="flow-a" x1="100" y1="225" x2="140" y2="225"/>
    <line class="flow-a" x1="100" y1="290" x2="140" y2="290"/>
  </g>

  <!-- Partial-sum flow (top → bottom, one arrow per column exit) -->
  <g id="psum-flow">
    <line class="flow-p" x1="175" y1="315" x2="175" y2="345"/>
    <line class="flow-p" x1="260" y1="315" x2="260" y2="345"/>
    <line class="flow-p" x1="345" y1="315" x2="345" y2="345"/>
    <line class="flow-p" x1="430" y1="315" x2="430" y2="345"/>
  </g>

  <!-- Legend -->
  <g id="legend" transform="translate(480, 80)">
    <line class="flow-a" x1="0"  y1="5"  x2="30" y2="5" />
    <text class="legend" x="36" y="9">Act</text>
    <line class="flow-w" x1="0"  y1="25" x2="30" y2="25"/>
    <text class="legend" x="36" y="29">Wgt</text>
    <line class="flow-p" x1="0"  y1="45" x2="30" y2="45"/>
    <text class="legend" x="36" y="49">Sum</text>
  </g>
</svg>
