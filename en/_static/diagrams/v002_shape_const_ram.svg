<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img">
  <title>pccx v002 — shape_const_ram MEMSET write / shape-pointer read paths</title>

  <defs>
    <marker id="arr-scr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#000000"/>
    </marker>
    <style><![CDATA[
      text { fill: #000000; font: 400 12px "IBM Plex Mono", "Courier New", "JetBrains Mono", ui-monospace, monospace; }
      .t-title  { font-weight: 600; font-size: 14px; text-anchor: middle; }
      .t-label  { font-size: 11px; text-anchor: middle; }
      .t-spec   { font-size: 10px; fill: #444444; text-anchor: middle; }

      .panel-pl   { fill: #fafafa; stroke: #000000; stroke-width: 0.8; stroke-dasharray: 4 2; }
      .block-mem  { fill: #e2efd8; stroke: #000000; stroke-width: 0.8; }
      .block-ctrl { fill: #fce5c6; stroke: #000000; stroke-width: 0.8; }
      .block-host { fill: #dae7f4; stroke: #000000; stroke-width: 0.8; }
      .line       { stroke: #000000; stroke-width: 1; fill: none; marker-end: url(#arr-scr); }
    ]]></style>
  </defs>

  <!-- White canvas -->
  <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>

  <!-- PL domain border -->
  <rect class="panel-pl" x="30" y="20" width="580" height="320"/>
  <text class="t-label" x="80" y="38" text-anchor="start">PL (400 MHz Domain)</text>

  <!-- MEMSET decoder (write source) -->
  <rect class="block-ctrl" x="60" y="70" width="180" height="56"/>
  <text class="t-title" x="150" y="93">MEMSET Decoder</text>
  <text class="t-spec"  x="150" y="111">in mem_dispatcher</text>

  <!-- shape_const_ram (center) -->
  <rect class="block-mem" x="280" y="150" width="220" height="100"/>
  <text class="t-title" x="390" y="178">shape_const_ram</text>
  <text class="t-spec"  x="390" y="198">64 × shape_xyz_t</text>
  <text class="t-spec"  x="390" y="214">(3 × 17 bit = 51 bit)</text>
  <text class="t-spec"  x="390" y="232">write 1 cyc / read 0 cyc</text>

  <!-- ISA shape pointer (read source) -->
  <rect class="block-host" x="60" y="270" width="180" height="50"/>
  <text class="t-title" x="150" y="290">ISA shape pointer</text>
  <text class="t-spec"  x="150" y="308">rd_addr — 6 bit, ptr_addr_t</text>

  <!-- Consumer column (compute path) -->
  <rect class="block-ctrl" x="540" y="150" width="50" height="100"/>
  <text class="t-title"  x="565" y="205" transform="rotate(-90, 565, 205)">consumers</text>

  <!-- Write path: decoder -> RAM write port -->
  <line class="line" x1="240" y1="105" x2="280" y2="170"/>
  <text class="t-spec" x="280" y="130" text-anchor="end">wr_en, wr_addr, wr_xyz</text>

  <!-- Read path: ISA pointer -> RAM read port -->
  <line class="line" x1="240" y1="295" x2="280" y2="230"/>
  <text class="t-spec" x="280" y="278" text-anchor="end">rd_addr</text>

  <!-- Output: RAM -> consumer column -->
  <line class="line" x1="500" y1="200" x2="540" y2="200"/>
  <text class="t-spec" x="520" y="190" text-anchor="middle">rd_xyz (comb)</text>

</svg>
