site_name: uCA Documentation
site_dir: site

theme:
  name: material
  font: false
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
  palette:
    - scheme: slate
      primary: black
      accent: green            
      toggle:
        icon: material/weather-night
        name: Switch to Light Mode
    - scheme: default
      primary: white
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to Dark Mode

plugins:
  - search
  - i18n:
      docs_structure: suffix
      default_language: en
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ko
          name: Korean
          build: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/custom.css

nav:
  - HOME: index.md
  - v002: v002/
  - Devices: Devices/
  - Archive:
      - experimental_v001:
          - Overview: archive/experimental_v001/index.md
          - Architecture: archive/experimental_v001/Architecture/v001_architecture.md
          - Drivers:
              - ISA Spec: archive/experimental_v001/Drivers/ISA.md
              - ISA Spreadsheet: archive/experimental_v001/Drivers/ISA_Spreadsheet.md
              - API Reference: archive/experimental_v001/Drivers/v001_API.md
          - Agents: archive/experimental_v001/agents.md
  - Agents: agents.md