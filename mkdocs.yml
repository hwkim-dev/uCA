site_name: uCA Documentation
site_dir: site

theme:
  name: material
  font: false
  features:
    - navigation.sections
    - navigation.top
  palette:
    - scheme: slate
      primary: black
      accent: green            
      toggle:
        icon: material/weather-night
        name: Switch to Light Mode
    - scheme: default
      primary: white
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to Dark Mode

extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: Korean
      link: /ko/
      lang: ko

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/custom.css

nav:
  - HOME: index.md
  - Architecture: 
      - Overview: Architecture/index.md 
      - v001:
          - ISA Spec: Architecture/v001/v001_isa.md
  - Devices:
      - KV260: Devices/kv260.md
  - Drivers:
      - API: Drivers/API.md
  - Archive:
      - experimental_v001:
          - Overview: archive/experimental_v001/index.md
          - Architecture:
              - v001_architecture: archive/experimental_v001/Architecture/v001_architecture.md
          - Drivers:
              - ISA: archive/experimental_v001/Drivers/ISA.md
              - ISA_Spreadsheet: archive/experimental_v001/Drivers/ISA_Spreadsheet.md
              - v001_API: archive/experimental_v001/Drivers/v001_API.md
          - agents: archive/experimental_v001/agents.md
  - Agents: agents.md