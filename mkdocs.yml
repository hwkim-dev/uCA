site_name: uCA documentation
site_dir: site

theme:
  name: material
  font: false
  features:
    - navigation.tabs          # 상단 메뉴 활성화
    - navigation.expand        # 왼쪽 사이드바 접기/펼치기 활성화
    - navigation.top
  palette:
    # 1. 다크 모드 (기본)
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: 라이트 모드로 전환
    # 2. 라이트 모드
    - scheme: default
      primary: white
      accent: light-green
      toggle:
        icon: material/weather-sunny
        name: 다크 모드로 전환

extra_css:
  - stylesheets/custom.css

# [핵심] 사이드바가 접히려면 이렇게 하위 항목(들여쓰기)이 있어야 해!
nav:
  - HOME: index.md
  - Architecture: 
      - Overview: Architecture/Architecture.md
  - Devices: 
      - Overview: Devices/Devices.md
  - Drivers: 
      - Overview: Drivers/Drivers.md