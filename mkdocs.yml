site_name: uCA documentation
site_dir: site

theme:
  name: material
  palette:
    # 다크 모드를 가장 위로 올려서 기본값으로 설정
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
    - scheme: default
      primary: white
      accent: light-green
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
  font: false
  features:
    - navigation.top
    # navigation.tabs를 제거하여 메뉴를 왼쪽 사이드바로 고정

extra_css:
  - stylesheets/custom.css