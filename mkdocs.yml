site_name: uCA Documentation
site_dir: site

theme:
  name: material
  font: false
  features:
    - navigation.tabs          
    - navigation.expand        
    - navigation.top
  palette:
    # 다크 모드
    - scheme: slate
      primary: black
      accent: green            
      toggle:
        icon: material/weather-night
        name: 라이트 모드로 전환
    # 라이트 모드
    - scheme: default
      primary: white
      accent: green
      toggle:
        icon: material/weather-sunny
        name: 다크 모드로 전환

extra_css:
  - stylesheets/custom.css

# [핵심] 사이드바에 뜰 "파일 이름"을 직접 지정해 줌
nav:
  - HOME: index.md
  - Architecture: 
      - Architecture: Architecture/Architecture.md
  - Devices: 
      - Devices: Devices/Devices.md
  - Drivers: 
      - Drivers: Drivers/Drivers.md